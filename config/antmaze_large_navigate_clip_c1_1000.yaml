# AntMaze large, clip_path_to_goal + plan_candidates=1, 1000 epochs.
# Same as antmaze_large_navigate_clip_match_medium.yaml except
# plan_candidates: 1 and train_epochs: 1000.

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate

train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

batch_size: 1024
joint_horizon: 25
plan_candidates: 1
plan_noise_scale: 0.01
measure_timing: false
eval_freq: 100
eval_task_ids: "1,2,3,4,5"
eval_episodes_per_task: 10
eval_max_chunks: 200
eval_goal_tol: 0.5
eval_goal_dims: "0,1"

goub:
  rollout_loss_weight: 1.0
  value_geom_sample: false
  subgoal_value_alpha: 0.1
  clip_path_to_goal: true

critic_agent:
  action_chunk_horizon: 5

actor:
  spi_tau: 1.0
  spi_beta: 1.0
  spi_actor_layer_norm: true
