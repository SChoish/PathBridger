# Phi 레시피 + puzzle_4x5 베이스(critic kappa만 베이스에서).
# 변경점(alpha03_nogoalcap 대비): subgoal_value_alpha 0.3 → 0.1.
# goal 거리 cap 해제(max_goal_steps_from_env: false), clip_path/chunk_to_goal 은 유지.

env_name: puzzle-4x5-play-v0
dataset_dir: ~/.ogbench/data/puzzle-4x5-play-100m-v0
run_group: puzzle_4x5_phi_u4_alpha01_gap20_envgoal_nogoalcap_300
train_epochs: 300
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1

dynamics:
  max_goal_steps_from_env: false
  max_goal_steps: null
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.1
  subgoal_value_gap_scale: 20.0
  subgoal_goal_representation: phi

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.9
  kappa_d: 0.5
  max_goal_steps_from_env: false
  max_goal_steps: null
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
