# Linear-SDE dynamics + critic + actor offline training.
# Baseline for antmaze-teleport-navigate. Algorithm defaults come from
# agents/{dynamics,critic,actor}.py and main.py FLAGS.

env_name: antmaze-teleport-navigate-v0
run_group: antmaze_teleport_navigate
train_epochs: 1000

critic_agent:
  action_chunk_horizon: 5      # default 10
  discount: 0.995              # default 0.99

actor:
  spi_beta: 1.0                # default 10.0
