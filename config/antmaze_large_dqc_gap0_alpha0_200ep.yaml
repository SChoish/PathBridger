# dqc on antmaze-large-navigate-v0 (gap0 / alpha0), 200 epochs.

env_name: antmaze-large-navigate-v0
run_group: antmaze_large_dqc_te0_sn0_gap0_alpha0_200ep
train_epochs: 200
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 4

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 1
  subgoal_value_alpha: 0.0
  subgoal_value_gap_scale: 0.0
  subgoal_goal_representation: phi
  subgoal_target_mode: absolute
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  theta_schedule: prefix_progress
  theta_total: 1.0
  progress_alpha: 0.8
  residual_target_mode: displacement
  use_time_embedding: false
  state_normalization: false

critic_agent:
  algorithm: dqc
  critic_type: dqc
  use_chunk_critic: true
  action_chunk_horizon: 5
  full_chunk_horizon: 25
  discount: 0.995
  kappa_b: 0.9
  kappa_d: 0.9
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: full

actor:
  spi_beta: 1.0
  spi_tau: 5.0

batch_size: 1024
eval_freq: 100
final_eval_episodes_per_task: 20
