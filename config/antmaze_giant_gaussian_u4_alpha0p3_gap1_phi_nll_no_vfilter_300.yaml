# Antmaze giant: same as gap5 recipe but subgoal_value_gap_scale=1.0 (weaker exp weighting).

env_name: antmaze-giant-navigate-v0
run_group: antmaze_giant_gaussian_u4_alpha0p3_gap1_phi_nll_no_vfilter
train_epochs: 300
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1

dynamics:
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 1.0
  subgoal_goal_representation: phi

critic_agent:
  phi_goal_obs_indices: [0, 1]
  action_chunk_horizon: 5
  discount: 0.995
  goal_representation: phi

actor:
  spi_beta: 1.0
