# Cube-single 300-epoch run identical to
# cube_single_envgoal_u4_nll_alpha03_gap20_phi_no_vfilter_300.yaml except for
# the single ablation flag dynamics.subgoal_target_mode='displacement':
#   - subgoal_net predicts Delta = s_{t+K} - s_t (offset prior)
#   - the residual chain is trained with z0 = 0, zK = Delta
#   - external APIs (plan / predict_subgoal / actor / critic) still see
#     absolute states, so the rest of the pipeline is unchanged.
# alpha=0.3, gap_scale=20 are kept identical to the baseline so this run is a
# clean ablation of the displacement target representation.

env_name: cube-single-play-v0
run_group: cube_single_envgoal_u4_nll_alpha03_gap20_phi_disp_no_vfilter
train_epochs: 300
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1
subgoal_filter: false

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 20.0
  subgoal_goal_representation: phi
  subgoal_target_mode: displacement

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.93
  kappa_d: 0.8
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
