# Linear-SDE dynamics + critic + actor offline training.
# Baseline for cube-double-play. Algorithm defaults come from
# agents/{dynamics,critic,actor}.py and main.py FLAGS.

env_name: cube-double-play-v0
run_group: cube_double
train_epochs: 1000

critic_agent:
  action_chunk_horizon: 5      # default 10
  discount: 0.995              # default 0.99
  kappa_b: 0.93                # default 0.7
  kappa_d: 0.8                 # default 0.7

actor:
  spi_beta: 1.0                # default 10.0
