# Phi 레시피 + puzzle_3x3 베이스(critic kappa만 베이스에서).
# 변경점(envgoal_300 대비): max_goal_steps_from_env 해제 → goal 거리 cap 없이 trajectory terminal까지 sample.
# clip_path_to_goal / clip_chunk_to_goal 은 그대로 유지.

env_name: puzzle-3x3-play-v0
run_group: puzzle_3x3_phi_u4_gap20_envgoal_nogoalcap_300
train_epochs: 300
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1

dynamics:
  max_goal_steps_from_env: false
  max_goal_steps: null
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 20.0
  subgoal_goal_representation: phi

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.9
  kappa_d: 0.5
  max_goal_steps_from_env: false
  max_goal_steps: null
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
