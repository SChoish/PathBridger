# Giant navigate — τ=10, α=0.3, critic discount=0.995, 1000 epochs (linear dynamics GOUB).

env_name: antmaze-giant-navigate-v0
seed: 0
run_group: giant_dyn_t10_a030_g0995_1kep

train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100

batch_size: 1024
plan_candidates: 1
plan_noise_scale: 0.01

dynamics:
  bridge_gamma_inv: 0.0
  subgoal_distribution: deterministic
  subgoal_value_alpha: 0.3

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995

actor:
  spi_tau: 10.0
  spi_beta: 1.0
  spi_actor_layer_norm: true
  spi_conditioned: subgoal
