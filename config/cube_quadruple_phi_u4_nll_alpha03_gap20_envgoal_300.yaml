# Recipe aligned with cube-single-play config_used; critic from config/cube_quadruple.yaml base.

env_name: cube-quadruple-play-v0
dataset_dir: ~/.ogbench/data/cube-quadruple-play-100m-v0
run_group: cube_quadruple_phi_u4_gap20_envgoal_300
train_epochs: 300
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1
subgoal_filter: false

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 20.0
  subgoal_goal_representation: phi

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.93
  kappa_d: 0.8
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
