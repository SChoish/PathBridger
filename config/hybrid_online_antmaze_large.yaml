# State-only-offline + online hybrid: ONLINE phase.
#
# Loads the frozen offline components (dynamics path residual + flow subgoal net
# + value head V) from a checkpoint, collects fresh on-policy rollouts into a
# replay buffer, and trains the IDM, the action critic Q, and the SPI actor.
# The deterministic subgoal-spi net is the subgoal policy; when starting from a
# plain flow checkpoint (which has no subgoal_spi net) it is SPI-distilled online
# from the frozen flow subgoal + frozen V (--online_train_subgoal_spi=True).
#
# Run against the existing 600-epoch flow_subgoal checkpoints (300K online
# updates, eval every 100K):
#   PYTHONPATH=. MUJOCO_GL=egl python main.py \
#     --run_config config/hybrid_online_antmaze_large.yaml \
#     --hybrid_phase online \
#     --offline_run_dir /home/offrl/Pathbridger_hybrid/runs/flow_subgoal/checkpoints/antmaze-large-navigate-v0 \
#     --offline_load_step 600 \
#     --seed 0
#
# Keep dynamics/critic/horizon identical to the flow checkpoint's flags.json so
# the checkpoints load into matching network structures.

env_name: antmaze-large-navigate-v0
run_group: hybrid_online_antmaze_large
# Online schedule: 300K gradient updates, eval every 100K (also at the final step).
train_steps: 300000
log_every_n_steps: 2000
save_every_n_steps: 100000
eval_every_n_steps: 100000
horizon: 25
plan_candidates: 1
eval_task_ids: "1,2,3,4,5"
eval_episodes_per_task: 10

dynamics:
  max_goal_steps_from_env: false
  clip_path_to_goal: true
  subgoal_distribution: flow
  subgoal_num_samples: 1
  subgoal_flow_steps: 8
  subgoal_flow_noise_scale: 1.0
  subgoal_value_alpha: 0.0
  subgoal_value_gap_scale: 10.0
  subgoal_value_weight_max: 5.0
  subgoal_goal_representation: phi
  subgoal_target_mode: displacement
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  theta_schedule: prefix_progress
  theta_total: 1.0
  progress_alpha: 0.8
  residual_target_mode: displacement
  subgoal_eval_num_samples: 8

critic_agent:
  algorithm: trl
  critic_type: trl
  use_chunk_critic: false
  action_chunk_horizon: 5
  full_chunk_horizon: 25
  discount: 0.995
  tau_v: 0.7
  lambda_v_self: 1.0
  lambda_v_base: 1.0
  lambda_v_tri: 1.0
  value_base_horizon: 5
  value_transitive_reweight: true
  value_distance_weight_power: 0.0
  lambda_q_local: 1.0
  q_target_from_value: true
  goal_representation: full
  kappa_b: 0.9
  kappa_d: 0.9
  max_goal_steps_from_env: false
  clip_chunk_to_goal: true
  subgoal_value_bonus_type: transitive_product
  subgoal_value_log_eps: 1.0e-6
  subgoal_value_ratio_eps: 1.0e-3
  value_p_curgoal: 0.0
  value_p_trajgoal: 0.0
  value_p_randomgoal: 0.0
  value_geom_sample: true

actor:
  spi_beta: 1.0
  spi_tau: 5.0

batch_size: 1024

# ---- Online rollout / replay knobs (see flags in main.py) ----
online_freeze_offline: true
online_warmup_env_steps: 5000
online_random_env_steps: 5000
online_env_steps_per_update: 1
online_rebuild_every_env_steps: 2000
online_replay_capacity: 1000000
online_explore_noise: 0.1
online_collect_policy: actor
online_eval_flow_n_samples: 8
# Distill the deterministic subgoal-spi net online (required for plain flow ckpts).
online_train_subgoal_spi: true
