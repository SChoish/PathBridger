# State-only-offline + online hybrid: OFFLINE phase (action-free).
#
# Trains the forward-bridge dynamics (path residual), the value head V
# (TRL value-only; no action Q), the flow subgoal net, and SPI-distills a
# deterministic subgoal net from the flow net using V. Never uses actions.
#
# Run:
#   PYTHONPATH=. MUJOCO_GL=egl python main.py \
#     --run_config config/hybrid_offline_antmaze_large.yaml \
#     --hybrid_phase offline --seed 0
#
# The resulting run dir is the --offline_run_dir for the online phase.

env_name: antmaze-large-navigate-v0
run_group: hybrid_offline_antmaze_large
train_epochs: 600
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1
# Offline has no IDM/actor yet, so env eval is meaningless; disable it.
eval_freq: 0

dynamics:
  max_goal_steps_from_env: false
  clip_path_to_goal: true
  # Offline subgoal generator MUST be the flow net (distillation source).
  subgoal_distribution: flow
  subgoal_num_samples: 1
  subgoal_flow_steps: 8
  subgoal_flow_noise_scale: 1.0
  subgoal_value_alpha: 0.0
  subgoal_value_gap_scale: 10.0
  subgoal_value_weight_max: 5.0
  subgoal_goal_representation: phi
  subgoal_target_mode: displacement
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  theta_schedule: prefix_progress
  theta_total: 1.0
  progress_alpha: 0.8
  residual_target_mode: displacement
  # Best-of-N candidate count reused as the subgoal-spi proposal count.
  subgoal_eval_num_samples: 8

critic_agent:
  algorithm: trl
  critic_type: trl
  use_chunk_critic: false
  action_chunk_horizon: 5
  full_chunk_horizon: 25
  discount: 0.995
  tau_v: 0.7
  lambda_v_self: 1.0
  lambda_v_base: 1.0
  lambda_v_tri: 1.0
  value_base_horizon: 5
  value_transitive_reweight: true
  value_distance_weight_power: 0.0
  lambda_q_local: 1.0
  q_target_from_value: true
  goal_representation: full
  kappa_b: 0.9
  kappa_d: 0.9
  max_goal_steps_from_env: false
  clip_chunk_to_goal: true
  subgoal_value_bonus_type: transitive_product
  subgoal_value_log_eps: 1.0e-6
  subgoal_value_ratio_eps: 1.0e-3
  value_p_curgoal: 0.0
  value_p_trajgoal: 0.0
  value_p_randomgoal: 0.0
  value_geom_sample: true

actor:
  # Reused by the deterministic subgoal-spi net (spi_tau / spi_beta).
  spi_beta: 1.0
  spi_tau: 5.0

batch_size: 1024
