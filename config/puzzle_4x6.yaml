# Linear-SDE dynamics + critic + actor offline training.
# Baseline for puzzle-4x6-play (100M public shards).
# Algorithm defaults come from agents/{dynamics,critic,actor}.py and
# main.py FLAGS.

env_name: puzzle-4x6-play-v0
dataset_dir: ~/.ogbench/data/puzzle-4x6-play-100m-v0
run_group: puzzle_4x6
train_epochs: 1000

critic_agent:
  action_chunk_horizon: 5      # default 10
  discount: 0.995              # default 0.99
  kappa_b: 0.7                 # default 0.7 (kept for clarity; same as default)
  kappa_d: 0.5                 # default 0.7

actor:
  spi_beta: 1.0                # default 10.0
