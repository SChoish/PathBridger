# Cube-single-play: subgoal value bonus off, exponential gap scale 0 (uniform MSE weight),
# critic/actor action chunk horizon 10.

env_name: cube-single-play-v0
run_group: cube_single_alpha0_gap0_h10
train_epochs: 1000

dynamics:
  subgoal_value_alpha: 0.0
  subgoal_value_gap_scale: 0.0

critic_agent:
  action_chunk_horizon: 10
  discount: 0.995
  kappa_b: 0.93
  kappa_d: 0.8

actor:
  spi_beta: 1.0
