# Same as runs/20260512_165025/config_used.yaml (gap_scale=50, alpha=0.0)
# except dynamics.subgoal_target_mode is switched to 'displacement':
#   - subgoal_net predicts Delta = s_{t+K} - s_t (offset prior)
#   - the residual chain / bridge is trained with z0 = 0, zK = Delta
#   - external APIs still expose absolute states, so the actor/critic and
#     rollout scripts work unchanged.
# Keep subgoal_value_weight_max=0.0 (no clipping) for a clean baseline; pair
# with a *_wmax20 variant once the displacement run is observed to need it.

env_name: cube-double-play-v0
run_group: cube_double_phi_u4_alpha00_gap50_disp_envgoal_500
train_epochs: 500
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1
subgoal_filter: false

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.0
  subgoal_value_gap_scale: 50.0
  subgoal_value_weight_max: 0.0
  subgoal_goal_representation: phi
  subgoal_target_mode: displacement

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.93
  kappa_d: 0.8
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
