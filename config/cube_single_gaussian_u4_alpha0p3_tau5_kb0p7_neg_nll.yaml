# Linear-SDE dynamics + critic + actor offline training.
# Cube-single ablation off the 20260506_102407 U=4 run:
#   - subgoal: diag_gaussian with U=4 sampled subgoals per state.
#   - plan_candidates: 1 bridge/action candidate per sampled subgoal (N=1).
#   - stochastic subgoal loss: value-gap weighted Gaussian NLL - alpha * V(sample).
#   - subgoal_value_alpha: 0.3 (V-bonus on predicted subgoal).
#   - SPI tau: 5.0.
#   - critic kappa_b: 0.7.
#   - critic gc_negative enabled.

env_name: cube-single-play-v0
run_group: cube_single_gaussian_u4_alpha0p3_tau5_kb0p7_neg_nll
train_epochs: 1000
plan_candidates: 1

dynamics:
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.7
  kappa_d: 0.8
  gc_negative: true

actor:
  spi_beta: 1.0
  spi_tau: 5.0
