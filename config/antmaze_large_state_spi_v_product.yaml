# State-space SPI (V-product energy) on antmaze-large-navigate-v0.
#
# State-subgoal actor minimizes:
#     L = E(s, z, g) + W2^2(pi0, pi) / (2 * spi_tau)
# with cost energy  E(s, z, g) = -V(s, z) * V(z, g)   (probability scale, no log).
# The Wasserstein anchor is the empirical distance to the dynamics proposal set.

env_name: antmaze-large-navigate-v0
run_group: antmaze_large_state_spi_v_product
train_epochs: 600
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 4

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 1
  subgoal_value_alpha: 0.1
  subgoal_value_gap_scale: 10.0
  subgoal_goal_representation: phi
  subgoal_target_mode: absolute
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  theta_schedule: prefix_progress
  theta_total: 1.0
  progress_alpha: 0.8
  residual_target_mode: displacement
  use_time_embedding: false
  state_normalization: false

critic_agent:
  algorithm: trl
  critic_type: trl
  use_chunk_critic: false
  action_chunk_horizon: 5
  full_chunk_horizon: 25
  discount: 0.995
  tau_v: 0.7
  lambda_v_self: 1.0
  lambda_v_base: 1.0
  lambda_v_tri: 1.0
  value_base_horizon: 5
  value_transitive_reweight: true
  value_distance_weight_power: 0.0
  # Pure state-space SPI: local action Q is not needed for the actor.
  lambda_q_local: 0.0
  goal_representation: full
  subgoal_value_bonus_type: transitive_product
  # State-space SPI energy: E = -V(s,z)V(z,g). No learned QZ critic.
  state_spi_energy_type: v_product
  use_qz_critic: false
  kappa_b: 0.9
  kappa_d: 0.9
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  value_p_curgoal: 0.0
  value_p_trajgoal: 0.0
  value_p_randomgoal: 0.0
  value_geom_sample: true

actor:
  actor_type: state_subgoal
  spi_tau: 5.0
  state_spi_target_mode: absolute

batch_size: 1024
eval_freq: 100
