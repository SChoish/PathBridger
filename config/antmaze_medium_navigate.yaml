# Linear-SDE dynamics + critic + actor offline training.
# Baseline for antmaze-medium-navigate. Algorithm defaults
# (theta_schedule=prefix_progress, subgoal_value_alpha=0.5,
# spi_tau=10.0, final_eval_episodes_per_task=50) come from
# agents/{dynamics,critic,actor}.py and main.py FLAGS.

env_name: antmaze-medium-navigate-v0
run_group: antmaze_medium_navigate
train_epochs: 200

critic_agent:
  action_chunk_horizon: 5      # default 10

actor:
  spi_beta: 1.0                # default 10.0
